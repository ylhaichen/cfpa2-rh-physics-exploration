planning:
  planner_name: physics_rh_cfpa2
  topk_candidate_limit: 8
  rollout:
    horizon: 6
    gamma: 0.90
    virtual_reveal_radius: 4
    virtual_gain_decay: 0.93
    score_mode: hybrid
    immediate_weight: 0.30
    future_weight: 1.0
    teammate_shared_gain_ratio: 0.5
    frontier_consumption_weight: 0.55
    frontier_consumption_decay: 0.98
    reassign_coupling_passes: 2
    frontier_density_radius: 6
    branch_inner_radius: 4
    branch_outer_radius: 10
    teammate_safe_distance: 6.0
    reassign_w_ig: 1.0
    reassign_w_distance: 0.30
    reassign_w_density: 0.95
    reassign_w_branch: 0.55
    reassign_w_teammate: 1.30
    reassign_w_reservation: 1.0
    lambda_corridor_occupancy: 0.32
    lambda_narrow_blocking: 0.48
    lambda_path_crossing: 0.26
    lambda_waiting_time: 0.24
    lambda_uncertainty_risk: 0.28
    uncertainty_gain_discount: 0.25
    uncertainty_clip: 2.0
    corridor_near_distance: 2.5
    blocking_window: 2
    waiting_window: 2
predictor:
  type: physics_residual
  horizon_steps: 8
  physics_residual:
    enabled: true
    weight_file: null
    residual_scale: 0.35
    occupancy_patch_radius: 4
    hidden_dims: [128, 128]
    enable_uncertainty: true
    uncertainty_ensemble_samples: 5
    uncertainty_feature_noise_std: 0.03
    uncertainty_base: 0.03
    uncertainty_scale: 1.0
    uncertainty_max: 2.0
